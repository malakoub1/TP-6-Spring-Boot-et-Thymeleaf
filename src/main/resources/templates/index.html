<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste utilisateurs</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h2>Liste des utilisateurs</h2>

    <a th:href="@{/users/new}">➕ Ajouter un utilisateur</a>

    <table>

        <thead>
        <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Modifier</th>
            <th>Supprimer</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="u : ${users}">

            <td th:text="${u.name}"></td>
            <td th:text="${u.email}"></td>

            <td>
                <a th:href="@{/users/edit/{id}(id=${u.id})}">Modifier</a>
            </td>

            <td>
                <a th:href="@{/users/remove/{id}(id=${u.id})}">Supprimer</a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
